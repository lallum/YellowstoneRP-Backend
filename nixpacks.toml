# This project now deploys with Dockerfile on Railway.
# Railway will use Dockerfile from the repo root.
# Keep this file only as a fallback; it should not be used while Dockerfile exists.

[phases.setup]
nixPkgs = ["nodejs_20", "npm-10_x"]

[phases.install]
cmds = ["echo Dockerfile deployment should be used instead of Nixpacks"]

[phases.build]
cmds = ["echo Dockerfile deployment should be used instead of Nixpacks"]

[start]
cmd = "node dist/index.js"
